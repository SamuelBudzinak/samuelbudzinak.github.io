<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bachelor Thesis</title>
    <style>

:root {
    --bg: #f7f7f5;
    --text: #1f1f1f;
    --muted: #666666;
    --card: #ffffff;
    --border: #dddddd;
    --accent: #1f77b4;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
}

main {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 24px;
}

h1 {
    margin-top: 0;
    font-size: 2.2rem;
    line-height: 1.15;
}

h2 {
    margin-top: 2rem;
}

p {
    color: var(--muted);
    font-size: 1.05rem;
}

a {
    color: var(--accent);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-top: 22px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
}

.button {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 16px;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-weight: bold;
}

.button:hover {
    text-decoration: none;
    filter: brightness(0.95);
}

.small {
    font-size: 0.92rem;
    color: var(--muted);
}

.plot-page {
    max-width: none;
    padding: 24px;
}

.plot-wrapper {
    width: 100%;
    height: calc(100vh - 150px);
    min-height: 620px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
}

    </style>
</head>
<body>
    <main>
        <h1>Bachelor thesis</h1>

        <p>
            Supplementary interactive visualisations for the bachelor thesis.
        </p>

        <div class="card">
            <h2>Interactive 3D stability plot</h2>
            <p>
                Rotatable 3D visualisation of the typical current density
                and the representative normalised temporal change during
                measurement days.
            </p>

            <a class="button" href="3d_plot/">
                Open 3D plot
            </a>
        </div>

        <p class="small">
            <a href="../">Back to homepage</a>
        </p>
    </main>
</body>
</html>
