<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stability Plot</title>
    <style>

:root {
    --bg: #f7f7f5;
    --text: #1f1f1f;
    --muted: #666666;
    --card: #ffffff;
    --border: #dddddd;
    --accent: #1f77b4;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
}

main {
    max-width: 900px;
    margin: 0 auto;
    padding: 56px 24px;
}

h1 {
    margin-top: 0;
    font-size: 2.2rem;
    line-height: 1.15;
}

h2 {
    margin-top: 2rem;
}

p {
    color: var(--muted);
    font-size: 1.05rem;
}

a {
    color: var(--accent);
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    margin-top: 22px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
}

.button {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 16px;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-weight: bold;
}

.button:hover {
    text-decoration: none;
    filter: brightness(0.95);
}

.small {
    font-size: 0.92rem;
    color: var(--muted);
}

.plot-page {
    max-width: none;
    padding: 24px;
}

.plot-wrapper {
    width: 100%;
    height: calc(100vh - 150px);
    min-height: 620px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px;
}


body {
    overflow-x: hidden;
}

.header {
    max-width: 1200px;
    margin: 0 auto;
    padding: 22px 24px 8px 24px;
}

.header h1 {
    margin-bottom: 4px;
    font-size: 1.7rem;
}

.header p {
    margin-top: 0;
}

.plot-page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 24px 24px;
}

.plot-wrapper {
    width: 100%;
    height: calc(100vh - 140px);
    min-height: 650px;
}
    </style>
</head>

    </div>
