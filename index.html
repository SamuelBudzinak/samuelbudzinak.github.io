<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel Budziňák</title>
  <meta name="description" content="Osobná stránka Samuela Budziňáka.">
  <style>
    :root {
      color-scheme: light;
      --background: #f5f4f0;
      --surface: #ffffff;
      --text: #142b3b;
      --muted: #667785;
      --accent: #0f4867;
      --border: #dbe2e6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--background);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(760px, 100%);
      padding: clamp(36px, 7vw, 72px);
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 18px 55px rgba(20, 43, 59, 0.08);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.7rem, 8vw, 5rem);
      line-height: 0.98;
    }

    .intro {
      max-width: 560px;
      margin: 22px 0 34px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      border-color: #a8beca;
      box-shadow: 0 12px 28px rgba(20, 43, 59, 0.09);
    }

    .link-card strong,
    .link-card span {
      display: block;
    }

    .link-card span {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .arrow {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 1.5rem;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Osobná stránka</p>
    <h1>Samuel Budziňák</h1>

    <p class="intro">
      Vitajte na mojej osobnej stránke. Nižšie nájdete doplňujúce
      materiály k mojej bakalárskej práci.
    </p>

    <a class="link-card" href="bachelor_thesis/">
      <span>
        <strong>Bakalárska práca – doplňujúce grafy</strong>
        <span>Interaktívny prehliadač výsledkov</span>
      </span>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
  </main>
</body>
</html>
